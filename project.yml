name: aiжҷәеүӘ
options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    GENERATE_INFOPLIST_FILE: YES
targets:
  aiжҷәеүӘ:
    type: application
    platform: macOS
    sources:
      - path: aiжҷәеүӘ
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.aizhijian
        PRODUCT_NAME: "AI жҷәеүӘ"
        PRODUCT_MODULE_NAME: aiZhijian
    info:
      path: aiжҷәеүӘ/Info.plist
      properties:
        CFBundleDisplayName: "AI жҷәеүӘ"
        NSHumanReadableCopyright: "Copyright В© 2026"
        NSAppTransportSecurity:
          NSExceptionDomains:
            43.139.67.8:
              NSExceptionAllowsInsecureHTTPLoads: true

  aiжҷәеүӘTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: aiжҷәеүӘTests
    dependencies:
      - target: aiжҷәеүӘ
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.aizhijian.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AI жҷәеүӘ.app/Contents/MacOS/AI жҷәеүӘ"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  aiжҷәеүӘ:
    build:
      targets:
        aiжҷәеүӘ: [all]
    test:
      targets:
        - aiжҷәеүӘTests
